<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon characterSelect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pokemon Character</h1>
        <select id="characterSelect">
            <option value="">-- Select characters... --</option>
        </select>
        <button id="getCharacterBtn">Get Character</button>

        <div id="characterInfo">
            <h2 id="name">Name: </h2>
            <p id="type">Type: </p>
            <img id="image" src="" alt="Character Image"/>
            <p id="info1"></p>
            <p id="info2"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
